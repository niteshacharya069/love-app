<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>I Love You ❤️</title>
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Dancing+Script:wght@400;700&display=swap');
        
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }
        
        body {
            font-family: 'Dancing Script', cursive;
            background: linear-gradient(-45deg, #ff6b6b, #feca57, #48dbfb, #ff9ff3);
            background-size: 400% 400%;
            animation: gradientShift 15s ease infinite;
            height: 100vh;
            display: flex;
            justify-content: center;
            align-items: center;
            overflow: hidden;
            cursor: none;
        }
        
        @keyframes gradientShift {
            0% { background-position: 0% 50%; }
            50% { background-position: 100% 50%; }
            100% { background-position: 0% 50%; }
        }
        
        .container {
            text-align: center;
            max-width: 800px;
            padding: 20px;
            opacity: 0;
            transform: scale(0.5);
            animation: fadeInUp 2s ease forwards;
        }
        
        @keyframes fadeInUp {
            to {
                opacity: 1;
                transform: scale(1);
            }
        }
        
        h1 {
            font-size: 4rem;
            color: white;
            text-shadow: 0 0 20px rgba(255,255,255,0.8);
            margin-bottom: 20px;
            animation: pulse 2s infinite;
        }
        
        @keyframes pulse {
            0%, 100% { transform: scale(1); }
            50% { transform: scale(1.05); }
        }
        
        .message {
            font-size: 1.8rem;
            color: white;
            margin: 30px 0;
            line-height: 1.6;
            text-shadow: 0 0 10px rgba(255,255,255,0.5);
        }
        
        .heart {
            font-size: 3rem;
            color: #ff4757;
            animation: heartbeat 1.5s infinite;
            display: inline-block;
        }
        
        @keyframes heartbeat {
            0% { transform: scale(1); }
            14% { transform: scale(1.3); }
            28% { transform: scale(1); }
            42% { transform: scale(1.3); }
            70% { transform: scale(1); }
        }
        
        .surprise-btn {
            background: rgba(255,255,255,0.2);
            border: 3px solid white;
            color: white;
            padding: 15px 40px;
            font-size: 1.5rem;
            border-radius: 50px;
            cursor: pointer;
            backdrop-filter: blur(10px);
            transition: all 0.3s ease;
            font-family: inherit;
            margin-top: 30px;
        }
        
        .surprise-btn:hover {
            background: rgba(255,255,255,0.3);
            transform: scale(1.1);
            box-shadow: 0 10px 30px rgba(0,0,0,0.3);
        }
        
        .hearts {
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            pointer-events: none;
            z-index: 1;
        }
        
        .heart-particle {
            position: absolute;
            font-size: 20px;
            color: #ff4757;
            pointer-events: none;
            animation: floatUp 4s linear forwards;
        }
        
        @keyframes floatUp {
            0% {
                opacity: 1;
                transform: translateY(100vh) rotate(0deg);
            }
            100% {
                opacity: 0;
                transform: translateY(-100px) rotate(360deg);
            }
        }
        
        @media (max-width: 768px) {
            h1 { font-size: 2.5rem; }
            .message { font-size: 1.3rem; }
            .heart { font-size: 2rem; }
        }
    </style>
</head>
<body>
    <div class="hearts" id="hearts"></div>
    
    <div class="container">
        <h1>💕 My Love 💕</h1>
        <div class="message">
            <p>My Princess, you make my world brighter every single day.</p>
            <p class="heart">❤️ I love you more than words can say ❤️</p>
            <p>Forever yours,</p>
            <p><strong>Your Baby</strong></p>
        </div>
        <button class="surprise-btn" onclick="surprise()">💖 Surprise! 💖</button>
    </div>

    <script>
        // Floating hearts background
        function createHeart() {
            const heart = document.createElement('div');
            heart.className = 'heart-particle';
            heart.innerHTML = '💖';
            heart.style.left = Math.random() * 100 + '%';
            heart.style.animationDuration = (Math.random() * 3 + 2) + 's';
            document.getElementById('hearts').appendChild(heart);
            
            setTimeout(() => {
                heart.remove();
            }, 5000);
        }
        
        // Surprise function (REPLACED VERSION)
        function surprise() {
    document.body.requestFullscreen().catch(() => {});
    
    // 🔥 YOUR SONG: oursong.mp3 (CORRECTED)
    const audio = new Audio('oursong.mp3');
    
    audio.volume = 0.3;  // Soft romantic volume
    audio.loop = true;   // Loops continuously
    audio.play().catch(e => console.log('Our song started! ❤️'));
    
    // Heart explosion
    for(let i = 0; i < 50; i++) {
        setTimeout(createHeart, i * 50);
    }
    
    // Sweet message
    document.querySelector('.message').innerHTML = `
        <p>Every moment with you feels like a dream 💭</p>
        <p class="heart">❤️ You're my everything ❤️</p>
        <p>Our song playing... just like us forever ♫</p>
        <p><strong>I love you to the moon and back! 🌙</strong></p>
    `;
    
    // Hide button
    document.querySelector('.surprise-btn').style.display = 'none';
}
        
        // Click anywhere for hearts
        document.addEventListener('click', (e) => {
            for(let i = 0; i < 10; i++) {
                setTimeout(createHeart, i * 100);
            }
        });
    </script>
</body>
</html>
